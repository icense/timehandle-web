<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeHandle - 智能日历同步助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .icon {
            font-size: 72px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 32px;
        }
        .features {
            text-align: left;
            margin: 32px 0;
            padding: 0 16px;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            color: #333;
        }
        .feature::before {
            content: "✅";
            font-size: 18px;
        }
        .divider {
            height: 1px;
            background: #eee;
            margin: 24px 0;
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 24px 0;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .version {
            color: #999;
            font-size: 12px;
            margin-top: 24px;
        }
        .btn-download {
            display: inline-block;
            background: #007aff;
            color: white;
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 16px;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background: #0056b3;
        }
        .email {
            color: #999;
            font-size: 13px;
            margin-top: 24px;
        }
        .email a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📅</div>
        <h1>TimeHandle</h1>
        <div class="subtitle">智能日历同步助手</div>

        <div class="features">
            <div class="feature">多日历同步，自由选择</div>
            <div class="feature">智能提醒，重要日程不遗漏</div>
            <div class="feature">自动同步，保持最新状态</div>
            <div class="feature">无需注册，即开即用</div>
        </div>

        <a href="#" class="btn-download">→ 前往 App Store</a>

        <div class="divider"></div>

        <div class="links">
            <a href="privacy.html">隐私政策</a>
            <a href="terms.html">服务条款</a>
            <a href="support.html">联系我们</a>
        </div>

        <div class="version">版本 1.0.6</div>
        <div class="email">
            📧 <a href="mailto:support@timehandle.com">support@timehandle.com</a>
        </div>
    </div>
</body>
</html>
