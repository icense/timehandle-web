<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - TimeHandle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .icon { font-size: 64px; margin-bottom: 24px; }
        h1 { font-size: 36px; margin-bottom: 12px; }
        .sub { color: rgba(255,255,255,0.5); margin-bottom: 40px; }
        .email-box {
            background: rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 20px;
            margin: 32px 0;
        }
        .email {
            font-size: 24px;
            font-weight: 600;
            color: #a5b4fc;
        }
        .response {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
        }
        .back {
            display: inline-block;
            margin-top: 32px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }
        .back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">📧</div>
            <h1>联系我们</h1>
            <div class="sub">任何问题或建议，欢迎告诉我们</div>
            <div class="email-box">
                <div class="email">jinjiangasbod@gmail.com</div>
            </div>
            <div class="response">我们会在 24 小时内回复</div>
            <a href="index.html" class="back">← 返回首页</a>
        </div>
    </div>
</body>
</html>
